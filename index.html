<!DOCTYPE html>
<html>

<head>
	<title>Victoria Advanced Dental Clinic - Book Appointment</title>
	<!-- *Note: You must have internet connection on your laptop or pc other wise below code is not working -->
	<!-- CSS for full calender -->
	<link href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.9.0/fullcalendar.min.css" rel="stylesheet" />
	<!-- JS for jQuery -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<!-- JS for full calender -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.20.1/moment.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.9.0/fullcalendar.min.js"></script>
	<!-- bootstrap css and js -->
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" />
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
</head>

<body>
	<div class="container">
		<div class="row">
			<div class="col-lg-12">


				<!-- Begin Page Content -->
				<div class="container-fluid " id="content-table" style="padding-left:10%;padding-right:10%;">
					<div class="card shadow mb-12">
						<div class="card-header">
							<strong>Clinic Calendar</strong>

						</div>
						<div class="card-body">
							<!-- USE THIS SPACE FOR YOUR ADDITIONAL CODE SNIPPET -->
							<div id="calendar"></div>
							<!-- END OF YOUR ADDITIONAL CODE SNIPPET -->
						</div>
					</div>
					<div class="card shadow mb-12">
						<div class="card-header py-6">
							<strong>Book Appointment - Victoria Advanced Dental Clinic</strong>

						</div>
						<div class="card-body  bg-white" id="formAppointment">
							<!-- USE THIS SPACE FOR YOUR ADDITIONAL CODE SNIPPET -->

							<div class="form-group">
								<label for="fName">First Name*</label>
								<input type="text" id="fName" class="form-control" placeholder="Input First Name">
							</div>
							<div class="form-group">
								<label for="mName">Middle Name</label>
								<input type="text" id="mName" class="form-control" placeholder="Input Middle Name">
							</div>
							<div class="form-group">
								<label for="lName">last Name*</label>
								<input type="text" id="lName" class="form-control" placeholder="Input Last Name">
							</div>
							<div class="form-group">
								<label for="mNumber">Mobile Number*</label>
								<input type="text" id="mNumber" class="form-control" placeholder="Input Contact Number">
							</div>
							<div class="form-group">
								<label for="email">Email</label>
								<input type="text" id="email" class="form-control" placeholder="Input Email">
							</div>
							<div align="center">

								<button class="btn btn-primary" onClick="book()">Book Appointment</button>

							</div>
							<!-- END OF YOUR ADDITIONAL CODE SNIPPET -->
						</div>
					</div>
					<!-- Page Heading -->


				</div>

				<!-- /.container-fluid -->
			</div>
		</div>
	</div>


	<br>

</body>
<script>

	function book() {
		var fname = document.getElementById("fName").value;
		var mname = document.getElementById("mName").value;
		var lname = document.getElementById("lName").value;
		var mobile = document.getElementById("mNumber").value;
		var email = document.getElementById("email").value;

		if (fname == "" || lname == "" || mobile == "") {
			alert("all fields with (*) is required.");
		} else if (mobile.length <= 9) {
			alert("Invalid Mobile Number");


		} else {
			var fd = new FormData();
			fd.append('fname', fname);
			fd.append('mname', mname);
			fd.append('lname', lname);
			fd.append('mobile', mobile);
			fd.append('email', email);
			$.ajax({
				url: "save_appointment.php",
				data: fd,
				processData: false,
				contentType: false,
				type: 'POST',
				success: function (result) {
					console.log('save_appointment response:', result);
					result = result.trim();
					if (result == "success") {
						document.getElementById("formAppointment").innerHTML = "<div class='row'><div class='col-lg-12' align='center'><h3>Your appointment request has been sent. We will reach you out thru call or sms.</h3></div></div>";
					} else {
						document.getElementById("formAppointment").innerHTML = result;
					}
				},
				error: function (xhr, status, error) {
					console.error('save_appointment ajax error', xhr.status, error, xhr.responseText);
					alert('Unable to save appointment. Check browser console for details.');
				}
			});

		}


	}

	$(document).ready(function () {
		display_events();
	}); //end document.ready block

	function display_events() {
		var events = new Array();
		$.ajax({
			url: 'display_event.php',
			dataType: 'json',
			success: function (response) {

				var result = response.data;
				$.each(result, function (i, item) {
					events.push({
						event_id: result[i].event_id,
						title: result[i].title,
						start: result[i].start,
						end: result[i].end,
						color: result[i].color,
						url: result[i].url
					});
				})
				var calendar = $('#calendar').fullCalendar({
					defaultView: 'month',
					timeZone: 'local',
					editable: true,
					selectable: true,
					selectHelper: true,
					select: function (start, end) {
						//alert(start);
						//alert(end);
						$('#event_start_date').val(moment(start).format('YYYY-MM-DD'));
						$('#event_end_date').val(moment(end).format('YYYY-MM-DD'));
						$('#event_entry_modal').modal('show');
					},
					events: events,
					eventRender: function (event, element, view) {
						element.bind('click', function () {

						});
					}
				}); //end fullCalendar block	
			},//end success block
			error: function (xhr, status, error) {
				console.error('display_event ajax error', xhr.status, error, xhr.responseText);
				alert('Unable to load calendar events. Check browser console for details.');
			}
		});//end ajax block
	}

	function save_event() {
		var event_name = $("#event_name").val();
		var event_start_date = $("#event_start_date").val();
		var event_end_date = $("#event_end_date").val();
		if (event_name == "" || event_start_date == "" || event_end_date == "") {
			alert("Please enter all required details.");
			return false;
		}
		$.ajax({
			url: "save_event.php",
			type: "POST",
			dataType: 'json',
			data: { event_name: event_name, event_start_date: event_start_date, event_end_date: event_end_date },
			success: function (response) {
				$('#event_entry_modal').modal('hide');
				if (response.status == true) {
					alert(response.msg);
					location.reload();
				}
				else {
					alert(response.msg);
				}
			},
			error: function (xhr, status) {
				console.log('ajax error = ' + xhr.statusText);
				alert(response.msg);
			}
		});
		return false;
	}
</script>

</html>
